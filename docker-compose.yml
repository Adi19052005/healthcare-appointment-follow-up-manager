services:
  nginx:
    image: nginx:1.27-alpine
    container_name: healthcare-nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      llm-service:
        condition: service_healthy
      scheduler-service:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - healthcare-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
        VITE_NOTIFICATION_SERVICE_URL: /api/notifications
    container_name: healthcare-frontend
    restart: unless-stopped
    networks:
      - healthcare-net
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  backend:
    build:
      context: .
      dockerfile: src/Dockerfile
    container_name: healthcare-backend
    restart: unless-stopped
    env_file:
      - ./src/.env
    environment:
      PORT: 3000
      REDIS_URL: ${REDIS_URL}
      KAFKA_BROKER: kafka:9092
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      redis:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - healthcare-net
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: healthcare-notification-service
    restart: unless-stopped
    env_file:
      - ./notification-service/.env
    environment:
      PORT: 4001
      DATABASE_URL: ${DATABASE_URL}
      KAFKA_BROKER: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - healthcare-net
    expose:
      - "4001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:4001/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  llm-service:
    build:
      context: .
      dockerfile: llm-service/Dockerfile
    container_name: healthcare-llm-service
    restart: unless-stopped
    env_file:
      - ./llm-service/.env
    environment:
      PORT: 4002
      DATABASE_URL: ${DATABASE_URL}
      KAFKA_BROKER: kafka:9092
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - healthcare-net
    expose:
      - "4002"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:4002/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  scheduler-service:
    build:
      context: .
      dockerfile: scheduler-service/Dockerfile
    container_name: healthcare-scheduler-service
    restart: unless-stopped
    env_file:
      - ./scheduler-service/.env
    environment:
      PORT: 4003
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      KAFKA_BROKER: kafka:9092
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - healthcare-net
    expose:
      - "4003"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:4003/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  redis:
    image: redis:7.4-alpine
    container_name: healthcare-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - healthcare-net
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 5s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: healthcare-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - healthcare-net
    expose:
      - "2181"
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'echo ruok | nc -w 2 localhost 2181 | grep imok'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: healthcare-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - healthcare-net
    expose:
      - "9092"
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 40s

networks:
  healthcare-net:
    name: healthcare-net

volumes:
  redis_data:
    name: healthcare-redis-data
  nginx_cache:
    name: healthcare-nginx-cache
